openapi: 3.0.3
info:
  title: Vedika API
  version: 1.0.0
  description: |
    OpenAPI reference for the Vedika Express API.

    The implementation uses JSON request and response bodies, bearer-token authentication for protected routes,
    opaque cursor pagination for list endpoints, and full-replacement semantics for PUT operations.
servers:
  - url: http://localhost:3000
    description: Default local development server. The port is configurable at runtime.
tags:
  - name: Health
  - name: Auth
  - name: Booking Statuses
  - name: Event Statuses
  - name: Event Types
  - name: Service Providers
  - name: Call Records
  - name: Calendar Events
  - name: Payments
  - name: Services
  - name: Default Booking Configurations
  - name: Event Bookings
  - name: Customer Interactions
  - name: Followups
paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Health check
      description: Returns a liveness payload with the current server timestamp.
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a user
      description: Creates a new user account and immediately issues access and refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentialsRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'

  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Log in
      description: Authenticates an existing user and creates a new session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentialsRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAuthSession
      summary: Refresh tokens
      description: Rotates the refresh token for an active session and returns a fresh access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutUser
      summary: Log out
      description: Revokes the session identified by the supplied refresh token. The route is idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLogoutRequest'
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'

  /auth/me:
    get:
      tags: [Auth]
      operationId: getAuthenticatedUser
      summary: Get current user
      description: Returns the current user resolved from the bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /booking-statuses:
    get:
      tags: [Booking Statuses]
      operationId: listBookingStatuses
      summary: List booking statuses
      description: Returns booking statuses in descending created-at order using cursor pagination.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Paginated booking statuses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingStatusListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [Booking Statuses]
      operationId: createBookingStatus
      summary: Create booking status
      description: Creates a new booking status.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '201':
          description: Booking status created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingStatusEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'

  /booking-statuses/{id}:
    delete:
      tags: [Booking Statuses]
      operationId: deleteBookingStatus
      summary: Delete booking status
      description: Deletes a booking status by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /event-statuses:
    get:
      tags: [Event Statuses]
      operationId: listEventStatuses
      summary: List event statuses
      description: Returns event statuses in descending created-at order using cursor pagination.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Paginated event statuses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventStatusListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [Event Statuses]
      operationId: createEventStatus
      summary: Create event status
      description: Creates a new event status.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '201':
          description: Event status created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventStatusEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'

  /event-statuses/{id}:
    put:
      tags: [Event Statuses]
      operationId: updateEventStatus
      summary: Replace event status
      description: Replaces an event status. This is a full update and always requires `name`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '200':
          description: Event status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventStatusEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
    delete:
      tags: [Event Statuses]
      operationId: deleteEventStatus
      summary: Delete event status
      description: Deletes an event status by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /event-types:
    get:
      tags: [Event Types]
      operationId: listEventTypes
      summary: List event types
      description: Returns event types in descending created-at order using cursor pagination.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Paginated event types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventTypeListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [Event Types]
      operationId: createEventType
      summary: Create event type
      description: |
        Creates a new event type.

        The server also creates a default booking configuration for the event type, but the response only returns the
        event type itself.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '201':
          description: Event type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventTypeEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'

  /event-types/{id}:
    put:
      tags: [Event Types]
      operationId: updateEventType
      summary: Replace event type
      description: Replaces an event type. This is a full update and always requires `name`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NameRequest'
      responses:
        '200':
          description: Event type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventTypeEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
    delete:
      tags: [Event Types]
      operationId: deleteEventType
      summary: Delete event type
      description: Deletes an event type by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /service-providers:
    get:
      tags: [Service Providers]
      operationId: listServiceProviders
      summary: List service providers
      description: Returns service providers in descending created-at order using cursor pagination.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Paginated service providers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceProviderListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [Service Providers]
      operationId: createServiceProvider
      summary: Create service provider
      description: Creates a service provider. Email values are normalized to lowercase and blank optional strings become null.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceProviderRequest'
      responses:
        '201':
          description: Service provider created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceProviderEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'

  /service-providers/{id}:
    put:
      tags: [Service Providers]
      operationId: updateServiceProvider
      summary: Replace service provider
      description: Replaces a service provider. `name` is required and blank optional strings become null.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceProviderRequest'
      responses:
        '200':
          description: Service provider updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceProviderEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
    delete:
      tags: [Service Providers]
      operationId: deleteServiceProvider
      summary: Delete service provider
      description: Deletes a service provider by id. The request is rejected if any `Service` rows still reference the provider.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'

  /call-records:
    get:
      tags: [Call Records]
      operationId: listCallRecords
      summary: List call records
      description: Returns call records in descending created-at order using cursor pagination. When `phoneNumber` is supplied, it is normalized to a canonical Indian 10-digit form and matched against both `callerNumber` and `receiverNumber`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: phoneNumber
          in: query
          required: false
          schema:
            type: string
          description: Indian phone number filter matched against caller or receiver after normalization.
      responses:
        '200':
          description: Paginated call records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallRecordListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [Call Records]
      operationId: createCallRecord
      summary: Create call record
      description: Creates a call record. Caller and receiver numbers are normalized to a canonical Indian 10-digit form. `fileId` is optional and must reference an existing file when provided.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallRecordRequest'
      responses:
        '201':
          description: Call record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallRecordEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /call-records/{id}:
    get:
      tags: [Call Records]
      operationId: getCallRecordById
      summary: Get call record by id
      description: Returns a single call record by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Call record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallRecordEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /calendar-events:
    get:
      tags: [Calendar Events]
      operationId: listCalendarEvents
      summary: List calendar events
      description: |
        Returns a merged, paginated event feed ordered by event date ascending.

        The feed includes followups whose `dueDate` falls inside the requested date range and event bookings whose
        `muhurat` falls inside the requested date range. Both `fromDate` and `toDate` are required and inclusive
        across the full UTC day.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: fromDate
          in: query
          required: true
          description: Lower inclusive date bound in `YYYY-MM-DD` format.
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: true
          description: Upper inclusive date bound in `YYYY-MM-DD` format.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated calendar events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEventListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /payments:
    get:
      tags: [Payments]
      operationId: listPayments
      summary: List payments
      description: Returns payments in descending created-at order using cursor pagination. When `serviceId` is supplied, it filters to payments for that exact service.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: serviceId
          in: query
          required: false
          schema:
            type: string
          description: Exact service-id filter.
      responses:
        '200':
          description: Paginated payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [Payments]
      operationId: createPayment
      summary: Create payment
      description: Creates a payment linked to a service. `paymentProofFileId` is optional and must reference an existing file when provided.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /payments/{id}:
    get:
      tags: [Payments]
      operationId: getPaymentById
      summary: Get payment by id
      description: Returns a single payment by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Payments]
      operationId: updatePayment
      summary: Replace payment
      description: Replaces a payment using a full replacement payload.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /services/{id}:
    get:
      tags: [Services]
      operationId: getServiceById
      summary: Get service by id
      description: Returns a single service record by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Service fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    patch:
      tags: [Services]
      operationId: updateService
      summary: Update service amounts
      description: |
        Updates one or more editable financial fields on a service.

        Only `contractedAmount`, `customerPaidAmount`, `grossCommission`, `deduction`, and
        `commissionPaidAmount` are accepted. Omitted fields are left unchanged.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServicePatchRequest'
      responses:
        '200':
          description: Service updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /default-booking-configurations:
    get:
      tags: [Default Booking Configurations]
      operationId: listDefaultBookingConfigurations
      summary: List default booking configurations
      description: |
        Returns default booking configurations in descending created-at order using cursor pagination.

        `defaultStartTime` is always returned as a time-of-day string in `HH:mm:ss` format.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Paginated default booking configurations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultBookingConfigurationListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'

  /default-booking-configurations/{id}:
    put:
      tags: [Default Booking Configurations]
      operationId: updateDefaultBookingConfiguration
      summary: Replace default booking configuration
      description: |
        Replaces a default booking configuration.

        `defaultStartTime` accepts `HH:mm` or `HH:mm:ss`, while responses always use `HH:mm:ss`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DefaultBookingConfigurationRequest'
      responses:
        '200':
          description: Default booking configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultBookingConfigurationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'

  /event-bookings:
    get:
      tags: [Event Bookings]
      operationId: listEventBookings
      summary: List event bookings
      description: |
        Returns event bookings in descending created-at order using cursor pagination.

        The `name`, `phoneNumber`, `fromDate`, and `toDate` filters can be combined. Date filtering uses overlap
        semantics, so any booking touching the requested range is included.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: name
          in: query
          description: Case-insensitive customer-name substring filter.
          schema:
            type: string
        - name: phoneNumber
          in: query
          description: Exact phone-number match against any stored phone-number field.
          schema:
            type: string
        - name: fromDate
          in: query
          description: Lower date bound in `YYYY-MM-DD` format.
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          description: Upper date bound in `YYYY-MM-DD` format.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated event bookings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventBookingListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [Event Bookings]
      operationId: createEventBooking
      summary: Create event booking
      description: |
        Creates an event booking.

        `serviceProviderIds` can be supplied on create. Each selected provider is linked to the booking and
        automatically synced to a backing `Service` row. The response does not currently return provider ids.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBookingRequest'
      responses:
        '201':
          description: Event booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventBookingEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /event-bookings/{id}:
    get:
      tags: [Event Bookings]
      operationId: getEventBookingById
      summary: Get event booking by id
      description: |
        Returns a single event booking by id, including linked `serviceProviderIds` and backing `services`.

        `serviceProviderIds` are sorted ascending by id. `services` are sorted ascending by `serviceProviderId`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Event booking detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventBookingDetailEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Event Bookings]
      operationId: updateEventBooking
      summary: Replace event booking
      description: |
        Replaces an event booking.

        This is a full update. `serviceProviderIds` is required; send an empty array to clear all linked providers.
        The response still does not echo provider ids back. The final provider selection is also synced to backing
        `Service` rows: retained providers keep their existing service rows, removed providers lose them, and newly
        added providers get new ones.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBookingUpdateRequest'
      responses:
        '200':
          description: Event booking updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventBookingEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [Event Bookings]
      operationId: deleteEventBooking
      summary: Delete event booking
      description: Deletes an event booking by id. Linked `Service` rows are deleted automatically.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /customer-interactions:
    get:
      tags: [Customer Interactions]
      operationId: listCustomerInteractions
      summary: List customer interactions
      description: |
        Returns customer interactions in descending created-at order using cursor pagination.

        The list can be filtered by linked event booking, ignored state, or only-unlinked records.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: eventBookingId
          in: query
          description: Only return interactions linked to the given event booking id.
          schema:
            type: string
            minLength: 1
        - name: ignored
          in: query
          description: Filter by ignored state.
          schema:
            type: boolean
        - name: unlinkedOnly
          in: query
          description: Only return interactions that are not linked to any event booking.
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated customer interactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerInteractionListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    post:
      tags: [Customer Interactions]
      operationId: createCustomerInteraction
      summary: Create customer interaction
      description: |
        Creates a customer interaction.

        Omitted `eventBookingIds` becomes an empty array, and duplicate ids are deduplicated.
        `voiceNote` is optional and allowed only when `interactionType` is `WALK_IN`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInteractionRequest'
      responses:
        '201':
          description: Customer interaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerInteractionEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /customer-interactions/{id}:
    get:
      tags: [Customer Interactions]
      operationId: getCustomerInteraction
      summary: Get customer interaction
      description: Returns a single customer interaction by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Customer interaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerInteractionEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Customer Interactions]
      operationId: updateCustomerInteraction
      summary: Replace customer interaction
      description: |
        Replaces a customer interaction.

        This route replaces the full `eventBookingIds` set instead of appending to it.
        `voiceNote` is allowed only when `interactionType` is `WALK_IN`.
        Omitting `voiceNote` preserves the existing voice note, `voiceNote: null` also preserves it,
        and `clearVoiceNote: true` removes the existing voice note.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInteractionUpdateRequest'
      responses:
        '200':
          description: Customer interaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerInteractionEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [Customer Interactions]
      operationId: deleteCustomerInteraction
      summary: Delete customer interaction
      description: Deletes a customer interaction by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /customer-interactions/{id}/event-bookings:
    patch:
      tags: [Customer Interactions]
      operationId: associateCustomerInteractionEventBookings
      summary: Append event-booking links
      description: |
        Associates one or more event bookings with an existing customer interaction.

        Unlike `PUT /customer-interactions/{id}`, this route appends links, preserves existing links, and deduplicates
        repeated ids.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInteractionEventBookingsPatchRequest'
      responses:
        '200':
          description: Customer interaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerInteractionEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /customer-interactions/{id}/ignore:
    patch:
      tags: [Customer Interactions]
      operationId: updateCustomerInteractionIgnored
      summary: Toggle ignored state
      description: Updates only the `ignored` flag on a customer interaction.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInteractionIgnoreRequest'
      responses:
        '200':
          description: Customer interaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerInteractionEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /followups:
    get:
      tags: [Followups]
      operationId: listFollowups
      summary: List followups
      description: Returns followups in descending created-at order using cursor pagination and exact-match filters.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
        - name: dueDate
          in: query
          description: Exact due-date match as an ISO-8601 datetime string.
          schema:
            type: string
            format: date-time
        - name: type
          in: query
          description: Followup type filter.
          schema:
            $ref: '#/components/schemas/FollowupType'
        - name: eventBookingId
          in: query
          description: Exact event-booking-id match.
          schema:
            type: string
            minLength: 1
        - name: serviceProviderId
          in: query
          description: Exact service-provider-id match.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Paginated followups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowupListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
    post:
      tags: [Followups]
      operationId: createFollowup
      summary: Create followup
      description: |
        Creates a followup.

        `BOOKING` followups require `eventBookingId`; `SERVICE` followups require `serviceProviderId`.
        `customerInteractionId` is optional for both variants.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowupRequest'
      responses:
        '201':
          description: Followup created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowupEnvelope'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

  /followups/{id}:
    get:
      tags: [Followups]
      operationId: getFollowup
      summary: Get followup
      description: Returns a single followup by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Followup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowupEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [Followups]
      operationId: deleteFollowup
      summary: Delete followup
      description: Deletes a followup by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource identifier.
      schema:
        type: string
        minLength: 1
    LimitParam:
      name: limit
      in: query
      description: Page size. Defaults to 20 and is capped at 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    CursorParam:
      name: cursor
      in: query
      description: Opaque pagination cursor from the previous page.
      schema:
        type: string
  responses:
    NoContentResponse:
      description: No response body
    BadRequestResponse:
      description: Invalid request payload or query parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnauthorizedResponse:
      description: Missing, malformed, expired, or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundResponse:
      description: Requested resource or related resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ConflictResponse:
      description: Request conflicts with an existing unique record
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequestsResponse:
      description: Authentication rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
      example:
        error: Human-readable message

    Health:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time

    PageInfo:
      type: object
      required: [limit, hasNextPage, nextCursor]
      properties:
        limit:
          type: integer
          minimum: 1
        hasNextPage:
          type: boolean
        nextCursor:
          type: string
          nullable: true

    EventBookingMode:
      type: string
      enum: [PHONE_IN, WALK_IN]

    CustomerInteractionType:
      type: string
      enum: [WALK_IN, PHONE_IN, MISSED_CALL]

    FollowupType:
      type: string
      enum: [BOOKING, SERVICE]

    PaymentMode:
      type: string
      enum: [CASH, BANK_TRANSFER, UPI]

    CalendarEventType:
      type: string
      enum: [event_booking, followup]

    User:
      type: object
      required: [id, emailAddress, phoneNumber, createdAt, updatedAt]
      properties:
        id:
          type: string
        emailAddress:
          type: string
          format: email
        phoneNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'

    AuthCredentialsRequest:
      type: object
      required: [emailAddress, password]
      properties:
        emailAddress:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        deviceName:
          type: string
          nullable: true
          maxLength: 120

    AuthRefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1
        deviceName:
          type: string
          nullable: true
          maxLength: 120

    AuthLogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    NameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    BookingStatus:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BookingStatusEnvelope:
      type: object
      required: [bookingStatus]
      properties:
        bookingStatus:
          $ref: '#/components/schemas/BookingStatus'

    BookingStatusListEnvelope:
      type: object
      required: [bookingStatuses, pageInfo]
      properties:
        bookingStatuses:
          type: array
          items:
            $ref: '#/components/schemas/BookingStatus'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    EventStatus:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EventStatusEnvelope:
      type: object
      required: [eventStatus]
      properties:
        eventStatus:
          $ref: '#/components/schemas/EventStatus'

    EventStatusListEnvelope:
      type: object
      required: [eventStatuses, pageInfo]
      properties:
        eventStatuses:
          type: array
          items:
            $ref: '#/components/schemas/EventStatus'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    EventType:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EventTypeEnvelope:
      type: object
      required: [eventType]
      properties:
        eventType:
          $ref: '#/components/schemas/EventType'

    EventTypeListEnvelope:
      type: object
      required: [eventTypes, pageInfo]
      properties:
        eventTypes:
          type: array
          items:
            $ref: '#/components/schemas/EventType'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    ServiceProviderRequest:
      type: object
      required: [name, commissionRate]
      properties:
        name:
          type: string
          minLength: 1
        phoneNumber:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        commissionRate:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Percentage commission rate from 0 to 100 inclusive. Decimal values are allowed.

    ServiceProvider:
      type: object
      required: [id, name, phoneNumber, email, commissionRate, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        phoneNumber:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        commissionRate:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ServiceProviderEnvelope:
      type: object
      required: [serviceProvider]
      properties:
        serviceProvider:
          $ref: '#/components/schemas/ServiceProvider'

    ServiceProviderListEnvelope:
      type: object
      required: [serviceProviders, pageInfo]
      properties:
        serviceProviders:
          type: array
          items:
            $ref: '#/components/schemas/ServiceProvider'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    CallRecordRequest:
      type: object
      additionalProperties: false
      required: [callerNumber, receiverNumber]
      properties:
        callerNumber:
          type: string
          description: Phone number normalized to a canonical Indian 10-digit form before storage.
        receiverNumber:
          type: string
          description: Phone number normalized to a canonical Indian 10-digit form before storage.
        fileId:
          type: string
          nullable: true

    CallRecord:
      type: object
      required: [id, createdAt, updatedAt, callerNumber, receiverNumber, fileId]
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        callerNumber:
          type: string
        receiverNumber:
          type: string
        fileId:
          type: string
          nullable: true

    CallRecordEnvelope:
      type: object
      required: [callRecord]
      properties:
        callRecord:
          $ref: '#/components/schemas/CallRecord'

    CallRecordListEnvelope:
      type: object
      required: [callRecords, pageInfo]
      properties:
        callRecords:
          type: array
          items:
            $ref: '#/components/schemas/CallRecord'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    CalendarEvent:
      type: object
      required: [date, type, objectId]
      properties:
        date:
          type: string
          format: date-time
        type:
          $ref: '#/components/schemas/CalendarEventType'
        objectId:
          type: string

    CalendarEventListEnvelope:
      type: object
      required: [events, pageInfo]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/CalendarEvent'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    PaymentRequest:
      type: object
      additionalProperties: false
      required: [mode, amount, date, serviceId]
      properties:
        mode:
          $ref: '#/components/schemas/PaymentMode'
        amount:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          description: Positive decimal string with up to 2 fractional digits.
        date:
          type: string
          format: date
          description: Payment date in `YYYY-MM-DD` format.
        serviceId:
          type: string
        paymentProofFileId:
          type: string
          nullable: true

    Payment:
      type: object
      required: [id, createdAt, updatedAt, mode, amount, date, serviceId, paymentProofFileId]
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        mode:
          $ref: '#/components/schemas/PaymentMode'
        amount:
          type: string
          pattern: '^\d+(\.\d{2})$'
        date:
          type: string
          format: date
        serviceId:
          type: string
        paymentProofFileId:
          type: string
          nullable: true

    PaymentEnvelope:
      type: object
      required: [payment]
      properties:
        payment:
          $ref: '#/components/schemas/Payment'

    PaymentListEnvelope:
      type: object
      required: [payments, pageInfo]
      properties:
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    ServicePatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        contractedAmount:
          type: string
          nullable: true
          pattern: '^\d+(\.\d{1,2})?$'
          description: Non-negative decimal string with up to 2 fractional digits, or null.
        customerPaidAmount:
          type: string
          nullable: true
          pattern: '^\d+(\.\d{1,2})?$'
          description: Non-negative decimal string with up to 2 fractional digits, or null.
        grossCommission:
          type: string
          nullable: true
          pattern: '^\d+(\.\d{1,2})?$'
          description: Non-negative decimal string with up to 2 fractional digits, or null.
        deduction:
          type: string
          nullable: true
          pattern: '^\d+(\.\d{1,2})?$'
          description: Non-negative decimal string with up to 2 fractional digits, or null.
        commissionPaidAmount:
          type: string
          nullable: true
          pattern: '^\d+(\.\d{1,2})?$'
          description: Non-negative decimal string with up to 2 fractional digits, or null.

    Service:
      type: object
      required:
        [
          id,
          createdAt,
          updatedAt,
          serviceProviderId,
          eventBookingId,
          contractedAmount,
          customerPaidAmount,
          grossCommission,
          deduction,
          commissionPaidAmount
        ]
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        serviceProviderId:
          type: string
        eventBookingId:
          type: string
        contractedAmount:
          type: string
          nullable: true
          pattern: '^\d+(\.\d{2})$'
        customerPaidAmount:
          type: string
          nullable: true
          pattern: '^\d+(\.\d{2})$'
        grossCommission:
          type: string
          nullable: true
